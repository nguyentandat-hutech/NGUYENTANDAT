name: CI/CD Docker Java Project

on:
  push:
    branches: [ "main" ]

jobs:
  deploy-to-dockerhub:
    runs-on: ubuntu-latest

    steps:
      # 1. Lấy code về
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Cài đặt môi trường Java (Đảm bảo đúng version project của bạn)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # 3. Build file .jar (Bỏ qua chạy test để build nhanh hơn)
      - name: Build with Maven
        run: mvn clean package -DskipTests

      # 4. Đăng nhập Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 5. Build Image và Push
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Đổi 'java-spring-app' thành tên image bạn muốn nếu cần
          tags: ${{ secrets.DOCKER_USERNAME }}/java-spring-app:latest
