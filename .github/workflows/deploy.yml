name: CI/CD Docker Java Project

# Kích hoạt khi có hành động Push vào nhánh main
on:
  push:
    branches: [ "main" ]

jobs:
  deploy-to-dockerhub:
    runs-on: ubuntu-latest

    steps:
      # Robot 1: Lấy mã nguồn từ GitHub
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Robot 2: Đăng nhập vào Docker Hub (Sử dụng Secrets đã cài ở Bước 1)
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Robot 3: Build Image từ Dockerfile và Push lên Docker Hub
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .               # Chạy tại thư mục gốc của project
          push: true               # Đẩy lên sau khi build xong
          # tags: Tên_User_Docker/Tên_Image:phiên_bản
          tags: ${{ secrets.DOCKER_USERNAME }}/java-spring-app:latest
