name: Build and Push Docker Image

on:
  push:
    branches: [ "main" ] # Chạy mỗi khi push code lên nhánh main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1. Lấy code từ GitHub về máy ảo
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Đăng nhập vào Docker Hub sử dụng Secrets đã tạo
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3. Build Image và Push lên Docker Hub
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Thay 'your-docker-username' bằng tên thật hoặc dùng biến
          # 'spring-boot-app' là tên image bạn muốn đặt
          tags: ${{ secrets.DOCKER_USERNAME }}/spring-boot-app:latest
